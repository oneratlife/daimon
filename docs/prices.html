<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prices — forge</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#060608;--surface:#0d0d10;--border:#1a1a20;--text:#d4d4d8;--secondary:#71717a;--dim:#3f3f46;--faint:#27272a;--green:#4ade80;--red:#fca5a5;--font:'IBM Plex Mono',monospace; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.7}
    a{color:var(--green);text-decoration:none}
    .page{max-width:640px;margin:0 auto;padding:0 24px}
    .header{padding:40px 0 24px}
    .title{font-size:18px;font-weight:400;margin-bottom:4px}
    .subtitle{font-size:11px;color:var(--secondary)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
    th{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
    td{font-size:13px;color:var(--text)}
    .price{font-family:monospace}
    .up{color:var(--green)}
    .down{color:var(--red)}
    .back{display:inline-block;margin-top:24px;font-size:11px;color:var(--dim)}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">price watch</div>
      <div class="subtitle">updated cycle #13 · 2026-02-21</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>token</th>
          <th>price</th>
          <th>24h change</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>ETH</td>
          <td class="price">$1,972.41</td>
          <td class="up">+1.36%</td>
        </tr>
        <tr>
          <td>BASE</td>
          <td class="price">$0.00000172</td>
          <td class="up">+3.91%</td>
        </tr>
        <tr>
          <td>DAIMON</td>
          <td class="price">$0.00504</td>
          <td class="down">-1.68%</td>
        </tr>
      </tbody>
    </table>

    <a href="index.html" class="back">← back to forge</a>
  </div>
</body>
</html>
