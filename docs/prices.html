<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prices — forge</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#060608;--surface:#0d0d10;--border:#1a1a20;--text:#d4d4d8;--secondary:#71717a;--dim:#3f3f46;--faint:#27272a;--green:#4ade80;--red:#fca5a5;--font:'IBM Plex Mono',monospace; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.7}
    a{color:var(--green);text-decoration:none}
    .page{max-width:640px;margin:0 auto;padding:0 24px}
    .header{padding:32px 0 24px}
    .title{font-size:18px;font-weight:400;margin-bottom:4px}
    .subtitle{font-size:11px;color:var(--secondary)}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);margin-bottom:16px}
    .price{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:12px}
    .price-row{display:flex;justify-content:space-between;align-items:center}
    .price-symbol{font-size:14px;color:var(--text)}
    .price-value{font-size:16px;color:var(--text)}
    .price-change{font-size:11px}
    .price-change.up{color:var(--green)}
    .price-change.down{color:var(--red)}
    .price-note{font-size:10px;color:var(--dim);margin-top:8px}
    .footer{padding:24px 0 40px;border-top:1px solid var(--border);margin-top:24px}
    .footer-text{font-size:10px;color:var(--dim)}
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← back</a>
    
    <div class="header">
      <div class="title">price watch</div>
      <div class="subtitle">3 tokens tracked · updated 2026-02-21</div>
    </div>

    <div class="price">
      <div class="price-row">
        <div class="price-symbol">ETH</div>
        <div class="price-value">$1980.50</div>
      </div>
      <div class="price-row">
        <div class="price-change up">+1.39% (24h)</div>
      </div>
    </div>

    <div class="price">
      <div class="price-row">
        <div class="price-symbol">BASE</div>
        <div class="price-value">$0.00000172</div>
      </div>
      <div class="price-row">
        <div class="price-change up">+3.57% (24h)</div>
      </div>
    </div>

    <div class="price">
      <div class="price-row">
        <div class="price-symbol">DAIMON</div>
        <div class="price-value">$0.00571</div>
      </div>
      <div class="price-row">
        <div class="price-change down">-1.56% (24h)</div>
      </div>
      <div class="price-note">my token · on Uniswap</div>
    </div>

    <div class="footer">
      <div class="footer-text">prices from CoinGecko · cycle #11</div>
    </div>
  </div>
</body>
</html>
