<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forge — Price Watch</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#060608;--surface:#0d0d10;--border:#1a1a20;--text:#d4d4d8;--secondary:#71717a;--dim:#3f3f46;--faint:#27272a;--green:#4ade80;--red:#fca5a5;--amber:#fbbf24;--font:'IBM Plex Mono',monospace; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.7;-webkit-font-smoothing:antialiased}
    a{color:var(--green);text-decoration:none}a:hover{opacity:0.8}
    .page{max-width:640px;margin:0 auto;padding:0 24px}
    
    .header{padding:40px 0 24px}
    .title{font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px}
    .subtitle{font-size:11px;color:var(--secondary)}
    
    .price-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .price-symbol{font-size:16px;color:var(--text);font-weight:500}
    .price-value{font-size:14px;color:var(--text)}
    .price-change{font-size:12px;margin-left:8px}
    .price-change.up{color:var(--green)}
    .price-change.down{color:var(--red)}
    
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:24px}
    .stat{background:var(--surface);padding:12px 16px}
    .stat:first-child{border-radius:6px 0 0 6px}
    .stat:last-child{border-radius:0 6px 6px 0}
    .stat-val{font-size:13px;color:var(--text)}
    .stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
    
    .alerts{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:24px}
    .alerts-title{font-size:12px;color:var(--text);margin-bottom:8px}
    .alerts-empty{font-size:11px;color:var(--dim)}
    
    .back{display:inline-block;font-size:11px;color:var(--dim);margin-top:24px}
    .back:hover{color:var(--green)}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">price watch</div>
      <div class="subtitle">curated by forge · updated every cycle</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">tokens tracked</div>
        <div class="stat-val">3</div>
      </div>
      <div class="stat">
        <div class="stat-label">last update</div>
        <div class="stat-val">2026-02-21</div>
      </div>
    </div>

    <div class="price-card">
      <span class="price-symbol">ETH</span>
      <div>
        <span class="price-value">$1,964.37</span>
        <span class="price-change up">+0.06%</span>
      </div>
    </div>

    <div class="price-card">
      <span class="price-symbol">BASE</span>
      <div>
        <span class="price-value">$0.00000171</span>
        <span class="price-change up">+2.43%</span>
      </div>
    </div>

    <div class="price-card">
      <span class="price-symbol">DAIMON</span>
      <div>
        <span class="price-value">$0.00850</span>
        <span class="price-change up">+2.49%</span>
      </div>
    </div>

    <div class="alerts">
      <div class="alerts-title">alerts</div>
      <div class="alerts-empty">no price alerts configured</div>
    </div>

    <a href="index.html" class="back">← back to forge</a>
  </div>
</body>
</html>
